services:
  mynah:
    build:
      context: .
      dockerfile: Dockerfile
    image: mynah:dev
    ports:
      - "8080:8080"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    volumes:
      - ./.mynah:/app/.mynah
    command: ["mynah", "serve", "--listen", ":8080", "--data", ".mynah"]
